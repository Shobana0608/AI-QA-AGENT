
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI QA Agent — Local & Free</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --accent5: #ef4444;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --tag-bg: #1e1e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
  .orb2 { width: 500px; height: 500px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -6s; }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(40px, 30px); }
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 60px 0 40px;
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  .badge-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    letter-spacing: 0.05em;
  }
  .badge.green { border-color: rgba(16,185,129,0.4); color: var(--accent3); }
  .badge.cyan  { border-color: rgba(6,182,212,0.4);  color: var(--accent2); }
  .badge.amber { border-color: rgba(245,158,11,0.4); color: var(--accent4); }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto 36px;
    line-height: 1.6;
  }

  .stack-pills {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .pill:hover { border-color: var(--accent); transform: translateY(-2px); }
  .pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-purple { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot-cyan   { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot-green  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 48px 0;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .cap-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.6s ease both;
  }
  .cap-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 0 30px rgba(124,58,237,0.15);
  }
  .cap-card .icon { font-size: 1.6rem; margin-bottom: 12px; display: block; }
  .cap-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .cap-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .cap-card .accent-line { width: 32px; height: 2px; border-radius: 2px; margin-bottom: 14px; }

  .demo-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease both;
  }

  .demo-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .demo-dots { display: flex; gap: 6px; }
  .demo-dots span { width: 10px; height: 10px; border-radius: 50%; }
  .demo-dots .r { background: #ef4444; }
  .demo-dots .y { background: #f59e0b; }
  .demo-dots .g { background: #10b981; }

  .demo-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    text-align: center;
  }

  .demo-prompt {
    padding: 16px 20px;
    background: rgba(124,58,237,0.06);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
  }
  .demo-prompt::before { content: '> '; color: var(--accent); font-weight: 600; }

  .demo-output { padding: 20px; }

  .test-category { margin-bottom: 20px; }

    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
